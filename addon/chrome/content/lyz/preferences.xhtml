<vbox id="lyz-prefpane"
  xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
  xmlns:html="http://www.w3.org/1999/xhtml"
  onload="Zotero_Preferences.LyZ_Preferences.init()">
  <linkset>
    <html:link rel="localization" href="lyz.ftl"/>
  </linkset>
  <vbox class="main-section">
  <groupbox id="lyz-prefpane-server" data-l10n-id="lyz-pref-lyxserver-group">
    <label><html:h2 data-l10n-id="lyz-pref-lyxserver-heading"></html:h2></label>
    <label data-l10n-id="lyz-pref-pipe-path" control="lyz-lyxserver"/>
    <hbox align="center" flex="1">
      <html:input id="lyz-lyxserver" type="text" preference="extensions.lyz.lyxserver" class="lyz-text-input"
        oninput="Zotero_Preferences.LyZ_Preferences.save(false)"
        onchange="Zotero_Preferences.LyZ_Preferences.save(true)"/>
      <button id="lyz-save" data-l10n-id="lyz-pref-save-settings" oncommand="Zotero_Preferences.LyZ_Preferences.save(true)"/>
    </hbox>
    <label id="lyz-save-status" value="" hidden="true"/>
    <description data-l10n-id="lyz-pref-server-description"/>
  </groupbox>

  <groupbox id="lyz-prefpane-citekey" data-l10n-id="lyz-pref-citation-keys-group">
    <label><html:h2 data-l10n-id="lyz-pref-citation-keys-heading"></html:h2></label>
    <hbox align="center">
      <label data-l10n-id="lyz-pref-key-source" control="lyz-citekey-mode"/>
      <menulist id="lyz-citekey-mode" native="true" oncommand="Zotero_Preferences.LyZ_Preferences.onCiteKeyModeChanged(true)">
        <menupopup>
          <menuitem data-l10n-id="lyz-pref-citekey-mode-custom" value="custom"/>
          <menuitem data-l10n-id="lyz-pref-citekey-mode-zotero" value="zotero"/>
          <menuitem data-l10n-id="lyz-pref-citekey-mode-zotero-short" value="zoteroShort"/>
          <menuitem data-l10n-id="lyz-pref-citekey-mode-translator" value="translator"/>
        </menupopup>
      </menulist>
    </hbox>
    <label data-l10n-id="lyz-pref-custom-pattern" control="lyz-citekey"/>
    <html:input id="lyz-citekey" type="text" preference="extensions.lyz.citekey" class="lyz-text-input"
      oninput="Zotero_Preferences.LyZ_Preferences.save(false)"
      onchange="Zotero_Preferences.LyZ_Preferences.save(true)"/>
    <description data-l10n-id="lyz-pref-custom-pattern-desc"/>
  </groupbox>

  <groupbox id="lyz-prefpane-export" data-l10n-id="lyz-pref-bibtex-export-group">
    <label><html:h2 data-l10n-id="lyz-pref-bibtex-export-heading"></html:h2></label>
    <hbox align="center">
      <label data-l10n-id="lyz-pref-export-translator" control="lyz-format-menu"/>
      <menulist id="lyz-format-menu" native="true" preference="extensions.lyz.selectedTranslator"
        oncommand="Zotero_Preferences.LyZ_Preferences.save(true)">
        <menupopup id="lyz-format-popup">
          <menuitem label="BibTeX" value="9cb70025-a888-4a29-a210-93ec52da40d4"/>
        </menupopup>
      </menulist>
    </hbox>
    <checkbox id="lyz-journalabbrev" data-l10n-id="lyz-pref-journal-abbrev" native="true"
      preference="extensions.lyz.useJournalAbbreviation"
      oncommand="Zotero_Preferences.LyZ_Preferences.save(true)"/>
    <description data-l10n-id="lyz-pref-bibtex-translators-desc"/>
  </groupbox>
  </vbox>
</vbox>
