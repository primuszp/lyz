<vbox id="lyz-prefpane"
  xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
  xmlns:html="http://www.w3.org/1999/xhtml"
  onload="Zotero_Preferences.LyZ_Preferences.init()">
  <vbox class="main-section">
  <groupbox id="lyz-prefpane-server" aria-label="LyX Server">
    <label><html:h2>LyX Server</html:h2></label>
    <label value="Pipe path" control="lyz-lyxserver"/>
    <hbox align="center" flex="1">
      <html:input id="lyz-lyxserver" type="text" preference="extensions.lyz.lyxserver" style="flex: 1; min-width: 32em;"
        oninput="Zotero_Preferences.LyZ_Preferences.save(false)"
        onchange="Zotero_Preferences.LyZ_Preferences.save(true)"/>
      <button id="lyz-save" label="Save Settings" oncommand="Zotero_Preferences.LyZ_Preferences.save(true)"/>
    </hbox>
    <label id="lyz-save-status" value="" hidden="true"/>
    <description>Windows default: \\.\pipe\lyxpipe. Linux/macOS examples usually end in lyxpipe.</description>
  </groupbox>

  <groupbox id="lyz-prefpane-citekey" aria-label="Citation Keys">
    <label><html:h2>Citation Keys</html:h2></label>
    <hbox align="center">
      <label value="Key source" control="lyz-citekey-mode"/>
      <menulist id="lyz-citekey-mode" native="true" oncommand="Zotero_Preferences.LyZ_Preferences.onCiteKeyModeChanged(true)">
        <menupopup>
          <menuitem label="Custom pattern" value="custom"/>
          <menuitem label="Zotero library/key" value="zotero"/>
          <menuitem label="Zotero item key only" value="zoteroShort"/>
          <menuitem label="Translator generated" value="translator"/>
        </menupopup>
      </menulist>
    </hbox>
    <label value="Custom pattern" control="lyz-citekey"/>
    <html:input id="lyz-citekey" type="text" preference="extensions.lyz.citekey" style="min-width: 32em;"
      oninput="Zotero_Preferences.LyZ_Preferences.save(false)"
      onchange="Zotero_Preferences.LyZ_Preferences.save(true)"/>
    <description>Use keywords separated by spaces: author year title zotero zoteroShort. Example: author _ title _ year.</description>
  </groupbox>

  <groupbox id="lyz-prefpane-export" aria-label="BibTeX Export">
    <label><html:h2>BibTeX Export</html:h2></label>
    <hbox align="center">
      <label value="Export translator" control="lyz-format-menu"/>
      <menulist id="lyz-format-menu" native="true" preference="extensions.lyz.selectedTranslator"
        oncommand="Zotero_Preferences.LyZ_Preferences.save(true)">
        <menupopup id="lyz-format-popup">
          <menuitem label="BibTeX" value="9cb70025-a888-4a29-a210-93ec52da40d4"/>
        </menupopup>
      </menulist>
    </hbox>
    <checkbox id="lyz-journalabbrev" label="Use journal abbreviations" native="true"
      preference="extensions.lyz.useJournalAbbreviation"
      oncommand="Zotero_Preferences.LyZ_Preferences.save(true)"/>
    <description>The default Zotero installation normally provides BibTeX. Additional BibTeX-compatible exporters appear here if installed.</description>
  </groupbox>
  </vbox>
</vbox>
