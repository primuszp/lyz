<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">LyZ icon</title>
  <desc id="desc">A clean Zotero-style SVG application icon based on the provided LyZ lettering.</desc>
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0b1220" flood-opacity="0.18"/>
    </filter>
    <filter id="letterShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="7" dy="10" stdDeviation="3" flood-color="#111827" flood-opacity="0.25"/>
    </filter>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16a3ff"/>
      <stop offset="1" stop-color="#006ee6"/>
    </linearGradient>
    <linearGradient id="yellow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd43b"/>
      <stop offset="1" stop-color="#f4ad00"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f04414"/>
      <stop offset="1" stop-color="#b91c00"/>
    </linearGradient>
  </defs>

  <rect x="64" y="64" width="896" height="896" rx="204" fill="url(#tile)" filter="url(#softShadow)"/>
  <rect x="65.5" y="65.5" width="893" height="893" rx="202" fill="none" stroke="#d8dee8" stroke-width="3"/>

  <g transform="translate(508 526) rotate(-8) translate(-508 -526)" filter="url(#letterShadow)" stroke-linejoin="round" stroke-linecap="round">
    <!-- L -->
    <g transform="translate(154 268) rotate(-23)">
      <path d="M0 0 L142 0 L142 286 L302 286 L302 404 L0 404 Z" fill="#0068ce" opacity="0.98"/>
      <path d="M0 0 L142 0 L142 286 L302 286 L302 404 L0 404 Z" fill="url(#blue)" stroke="#0055b8" stroke-width="9"/>
    </g>

    <!-- y -->
    <g transform="translate(360 284) rotate(8)">
      <path d="M0 0 L134 0 L206 133 L285 0 L420 0 L277 236 L277 430 L142 430 L142 239 Z" fill="#db9900" opacity="0.98"/>
      <path d="M0 0 L134 0 L206 133 L285 0 L420 0 L277 236 L277 430 L142 430 L142 239 Z" fill="url(#yellow)" stroke="#c88600" stroke-width="9"/>
    </g>

    <!-- Z -->
    <g transform="translate(630 260) rotate(8)">
      <path d="M0 0 L352 0 L352 106 L160 288 L360 288 L360 404 L0 404 L0 299 L193 116 L0 116 Z" fill="#a91b00" opacity="0.98"/>
      <path d="M0 0 L352 0 L352 106 L160 288 L360 288 L360 404 L0 404 L0 299 L193 116 L0 116 Z" fill="url(#red)" stroke="#9f1b00" stroke-width="9"/>
    </g>
  </g>
</svg>
